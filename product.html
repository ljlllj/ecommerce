<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品详情 - 优品商城</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <div class="container">
    <a href="index.html" class="logo">优品<span>商城</span></a>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a href="products.html">全部商品</a>
      <a href="about.html">品牌故事</a>
      <a href="contact.html">联系我们</a>
    </nav>
    <div class="header-actions">
      <a href="cart.html" class="cart-icon">🛒<span class="cart-badge" id="cartBadge" style="display:none">0</span></a>
      <a href="login.html" class="btn btn-outline btn-sm">登录</a>
    </div>
  </div>
</header>

<div class="page-header">
  <div class="container">
    <h1 id="detailTitle">商品详情</h1>
    <div class="breadcrumb"><a href="index.html">首页</a> / <a href="products.html">全部商品</a> / <span id="detailBreadcrumb">商品详情</span></div>
  </div>
</div>

<div class="container">
  <div class="detail-grid" id="detailContent">
    <p style="text-align:center;padding:80px 0;color:var(--text-light);grid-column:1/-1;">加载中...</p>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer-grid">
      <div class="footer-col">
        <h4>关于优品商城</h4>
        <p>优品商城致力于为消费者提供高品质、高性价比的精选商品。</p>
      </div>
      <div class="footer-col">
        <h4>快速链接</h4>
        <ul>
          <li><a href="about.html">品牌故事</a></li>
          <li><a href="contact.html">联系我们</a></li>
          <li><a href="products.html">全部商品</a></li>
        </ul>
      </div>
      <div class="footer-col">
        <h4>联系方式</h4>
        <p>📧 service@youpin.com</p>
        <p>📞 400-888-6666</p>
        <p>📍 杭州市西湖区科技园路88号</p>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2026 优品商城 版权所有 | 网页设计课程大作业</p>
    </div>
  </div>
</footer>

<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const id = parseInt(getQueryParam('id'));
    const product = products.find(p => p.id === id);

    if (!product) {
      document.getElementById('detailContent').innerHTML = `
        <div style="grid-column:1/-1;text-align:center;padding:80px;">
          <p style="font-size:4rem;">😕</p>
          <h2>商品不存在</h2>
          <p style="color:var(--text-light);margin:12px 0 24px;">请检查商品链接是否正确</p>
          <a href="products.html" class="btn btn-primary">返回商品列表</a>
        </div>`;
      return;
    }

    document.getElementById('detailTitle').textContent = product.name;
    document.getElementById('detailBreadcrumb').textContent = product.name;

    document.getElementById('detailContent').innerHTML = `
      <div class="detail-img" style="background:${product.bg}">
        <span>${product.emoji}</span>
      </div>
      <div class="detail-info">
        ${product.badge ? `<span class="product-badge" style="position:static;display:inline-block;margin-bottom:8px;">${product.badge}</span>` : ''}
        <h1>${product.name}</h1>
        <p style="color:var(--text-light);margin-bottom:8px;">分类：${product.category}</p>
        <div class="price">${formatPrice(product.price)} <span style="font-size:0.9rem;color:var(--text-light);text-decoration:line-through;font-weight:400;">${formatPrice(product.originalPrice)}</span></div>
        <p class="desc">${product.desc}</p>
        <div class="quantity-selector">
          <span style="font-weight:600;">数量：</span>
          <button onclick="changeQty(-1)">−</button>
          <input type="number" id="quantity" value="1" min="1" max="99" onchange="validateQty()">
          <button onclick="changeQty(1)">+</button>
        </div>
        <button class="btn btn-primary" style="width:100%;padding:14px;font-size:1.05rem;" onclick="buyNow()">
          🛒 加入购物车
        </button>
      </div>
    `;

    window.changeQty = function(delta) {
      const input = document.getElementById('quantity');
      let val = parseInt(input.value) + delta;
      if (val < 1) val = 1;
      if (val > 99) val = 99;
      input.value = val;
    };

    window.validateQty = function() {
      const input = document.getElementById('quantity');
      let val = parseInt(input.value);
      if (isNaN(val) || val < 1) input.value = 1;
      if (val > 99) input.value = 99;
    };

    window.buyNow = function() {
      const qty = parseInt(document.getElementById('quantity').value);
      addToCart(product.id, qty);
    };
  });
</script>

</body>
</html>

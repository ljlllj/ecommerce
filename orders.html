<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的订单 - 优品商城</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <div class="container">
    <a href="index.html" class="logo">优品<span>商城</span></a>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a href="products.html">全部商品</a>
      <a href="about.html">品牌故事</a>
      <a href="contact.html">联系我们</a>
    </nav>
    <div class="header-actions">
      <a href="cart.html" class="cart-icon">🛒<span class="cart-badge" id="cartBadge" style="display:none">0</span></a>
      <a href="login.html" class="btn btn-outline btn-sm">登录</a>
    </div>
  </div>
</header>

<div class="page-header">
  <div class="container">
    <h1>📋 我的订单</h1>
    <div class="breadcrumb"><a href="index.html">首页</a> / 我的订单</div>
  </div>
</div>

<div class="container" style="margin-bottom:60px;">
  <div id="ordersContent"></div>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer-grid">
      <div class="footer-col">
        <h4>关于优品商城</h4>
        <p>优品商城致力于为消费者提供高品质、高性价比的精选商品。</p>
      </div>
      <div class="footer-col">
        <h4>快速链接</h4>
        <ul>
          <li><a href="about.html">品牌故事</a></li>
          <li><a href="contact.html">联系我们</a></li>
          <li><a href="products.html">全部商品</a></li>
        </ul>
      </div>
      <div class="footer-col">
        <h4>联系方式</h4>
        <p>📧 service@youpin.com</p>
        <p>📞 400-888-6666</p>
        <p>📍 杭州市西湖区科技园路88号</p>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2026 优品商城 版权所有 | 网页设计课程大作业</p>
    </div>
  </div>
</footer>

<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script>
  const statusMap = {
    pending: { text: '待发货', class: 'status-pending' },
    shipped: { text: '运输中', class: 'status-shipped' },
    delivered: { text: '已签收', class: 'status-delivered' }
  };

  function renderOrders() {
    const orders = JSON.parse(localStorage.getItem('ecommerce_orders') || '[]');
    const container = document.getElementById('ordersContent');

    if (orders.length === 0) {
      container.innerHTML = `
        <div class="cart-empty">
          <div class="icon">📋</div>
          <h2>还没有订单</h2>
          <p>快去挑选心仪的商品吧~</p>
          <a href="products.html" class="btn btn-primary">去逛逛</a>
        </div>`;
      return;
    }

    let html = '';
    orders.forEach((order, index) => {
      const status = statusMap[order.status] || statusMap.pending;
      const date = new Date(order.date).toLocaleString('zh-CN');

      let itemsHtml = order.items.map(item => {
        const product = products.find(p => p.id === item.id);
        if (!product) return '';
        return `<span style="display:inline-block;margin:4px 8px;background:var(--bg);padding:4px 12px;border-radius:4px;font-size:0.85rem;">
          ${product.emoji} ${product.name} x${item.quantity}
        </span>`;
      }).join('');

      // 随机状态展示（模拟订单流转）
      if (index === 0) order.status = 'shipped';
      if (index > 0 && index % 2 === 0) order.status = 'delivered';

      html += `
        <div class="order-card">
          <div class="order-header">
            <div>
              <span class="order-id">📦 ${order.id}</span>
              <span style="color:var(--text-light);font-size:0.82rem;margin-left:12px;">${date}</span>
            </div>
            <span class="order-status ${statusMap[order.status].class}">${statusMap[order.status].text}</span>
          </div>
          <div class="order-items">${itemsHtml}</div>
          <div class="order-total">合计：${formatPrice(order.total)}</div>
        </div>`;
    });

    container.innerHTML = html;
  }

  document.addEventListener('DOMContentLoaded', renderOrders);
</script>

</body>
</html>

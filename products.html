<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全部商品 - 优品商城</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <div class="container">
    <a href="index.html" class="logo">优品<span>商城</span></a>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a href="products.html" class="active">全部商品</a>
      <a href="about.html">品牌故事</a>
      <a href="contact.html">联系我们</a>
    </nav>
    <div class="header-actions">
      <a href="cart.html" class="cart-icon">🛒<span class="cart-badge" id="cartBadge" style="display:none">0</span></a>
      <a href="login.html" class="btn btn-outline btn-sm">登录</a>
    </div>
  </div>
</header>

<div class="page-header">
  <div class="container">
    <h1>全部商品</h1>
    <div class="breadcrumb"><a href="index.html">首页</a> / 全部商品</div>
  </div>
</div>

<div class="container">
  <!-- 筛选栏 -->
  <div class="filter-bar">
    <input type="text" id="searchInput" placeholder="🔍 搜索商品名称...">
    <select id="categoryFilter">
      <option value="">全部分类</option>
      <option value="数码">数码电子</option>
      <option value="家居">家居生活</option>
      <option value="服饰">服饰配饰</option>
      <option value="箱包">箱包出行</option>
    </select>
    <select id="sortSelect">
      <option value="default">默认排序</option>
      <option value="price-asc">价格从低到高</option>
      <option value="price-desc">价格从高到低</option>
    </select>
    <span id="resultCount" style="color:var(--text-light);font-size:0.88rem;white-space:nowrap;"></span>
  </div>

  <!-- 商品列表 -->
  <div class="product-grid" id="productList" style="margin-bottom:60px;"></div>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer-grid">
      <div class="footer-col">
        <h4>关于优品商城</h4>
        <p>优品商城致力于为消费者提供高品质、高性价比的精选商品。</p>
      </div>
      <div class="footer-col">
        <h4>快速链接</h4>
        <ul>
          <li><a href="about.html">品牌故事</a></li>
          <li><a href="contact.html">联系我们</a></li>
          <li><a href="products.html">全部商品</a></li>
        </ul>
      </div>
      <div class="footer-col">
        <h4>联系方式</h4>
        <p>📧 service@youpin.com</p>
        <p>📞 400-888-6666</p>
        <p>📍 杭州市西湖区科技园路88号</p>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2026 优品商城 版权所有 | 网页设计课程大作业</p>
    </div>
  </div>
</footer>

<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const searchInput = document.getElementById('searchInput');
    const categoryFilter = document.getElementById('categoryFilter');
    const sortSelect = document.getElementById('sortSelect');
    const productList = document.getElementById('productList');
    const resultCount = document.getElementById('resultCount');

    // 读取URL参数设置初始筛选
    const urlCategory = getQueryParam('category');
    if (urlCategory) categoryFilter.value = urlCategory;

    function renderProducts() {
      let filtered = [...products];

      // 搜索过滤
      const searchTerm = searchInput.value.toLowerCase().trim();
      if (searchTerm) {
        filtered = filtered.filter(p =>
          p.name.toLowerCase().includes(searchTerm) ||
          p.category.toLowerCase().includes(searchTerm)
        );
      }

      // 分类过滤
      const category = categoryFilter.value;
      if (category) {
        filtered = filtered.filter(p => p.category === category);
      }

      // 排序
      const sort = sortSelect.value;
      if (sort === 'price-asc') filtered.sort((a, b) => a.price - b.price);
      else if (sort === 'price-desc') filtered.sort((a, b) => b.price - a.price);

      resultCount.textContent = `共 ${filtered.length} 件商品`;
      productList.innerHTML = filtered.length > 0
        ? filtered.map(createProductCard).join('')
        : '<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-light);"><p style="font-size:3rem;margin-bottom:12px;">📭</p><p>没有找到匹配的商品</p></div>';
    }

    searchInput.addEventListener('input', renderProducts);
    categoryFilter.addEventListener('change', renderProducts);
    sortSelect.addEventListener('change', renderProducts);

    renderProducts();
  });
</script>

</body>
</html>
